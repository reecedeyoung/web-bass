name: Deploy — Production

on:
  # Fires automatically when release-please merges a Release PR and publishes a tag.
  release:
    types: [published]
  # Manual fallback — still available from the Actions tab.
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy" to confirm production deployment
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  guard:
    name: Confirm intent
    runs-on: ubuntu-latest
    # Only enforce the confirmation check for manual dispatches.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "Confirmation input was '${{ github.event.inputs.confirm }}', expected 'deploy'."
          exit 1

  staging-tests:
    name: Verify staging integration tests pass
    needs: [guard]
    if: always() && (needs.guard.result == 'success' || needs.guard.result == 'skipped')
    runs-on: ubuntu-latest
    environment: staging  # pulls TEST_USER_* and COGNITO_USER_POOL_CLIENT_ID from staging secrets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        working-directory: tests/integration
        run: npm install

      - name: Run integration tests against staging
        working-directory: tests/integration
        run: npm test
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          COGNITO_USER_POOL_CLIENT_ID: ${{ secrets.COGNITO_USER_POOL_CLIENT_ID }}
          API_BASE_URL: https://staging.web-bass.com

  deploy:
    name: Build & deploy to production
    needs: [guard, staging-tests]
    # Both guard and staging-tests must have succeeded (or guard was skipped for release events).
    if: >
      always() &&
      (needs.guard.result == 'success' || needs.guard.result == 'skipped') &&
      needs.staging-tests.result == 'success'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-bass-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: web-bass-frontend
        run: npm install

      - name: Build frontend
        working-directory: web-bass-frontend
        run: npm run build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_IDENTITY_POOL_ID: ${{ secrets.COGNITO_IDENTITY_POOL_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.COGNITO_HOSTED_UI_DOMAIN }}
          VITE_AWS_REGION: us-east-1
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Install Lambda dependencies
        working-directory: lambda/api
        run: npm install

      - name: Package Lambda
        working-directory: lambda/api
        run: npm run package

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda/api/api.zip

      - name: Sync to S3
        run: |
          aws s3 sync web-bass-frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp web-bass-frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
