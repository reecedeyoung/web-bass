name: Deploy — Staging

on:
  push:
    branches: [main]
    paths:
      - "web-bass-frontend/**"
      - ".github/workflows/deploy-staging.yml"

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy:
    name: Build & deploy to staging
    runs-on: ubuntu-latest
    environment: staging  # must match github_subject_claim in terraform.tfvars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-bass-frontend/package-lock.json

      - name: Install dependencies
        working-directory: web-bass-frontend
        run: npm install

      - name: Build
        working-directory: web-bass-frontend
        run: npm run build
        env:
          # Populate these from terraform output (staging environment secrets)
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_IDENTITY_POOL_ID: ${{ secrets.COGNITO_IDENTITY_POOL_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.COGNITO_HOSTED_UI_DOMAIN }}
          VITE_PRESETS_TABLE: ${{ secrets.DYNAMODB_PRESETS_TABLE }}
          VITE_MAPPINGS_TABLE: ${{ secrets.DYNAMODB_MAPPINGS_TABLE }}
          VITE_AWS_REGION: us-east-1
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync web-bass-frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp web-bass-frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
