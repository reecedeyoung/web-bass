<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 600" width="200" height="600" style="background:#fff">
  <!-- Body -->
  <rect x="30" y="300" width="140" height="180" fill="#111" stroke="#000" stroke-width="3"/>
  <!-- Upper bout cutaway -->
  <rect x="30" y="260" width="80" height="60" fill="#111" stroke="#000" stroke-width="3"/>
  <!-- Lower horn -->
  <rect x="110" y="280" width="60" height="40" fill="#111" stroke="#000" stroke-width="3"/>
  <!-- Neck -->
  <rect x="82" y="60" width="36" height="260" fill="#222" stroke="#000" stroke-width="3"/>
  <!-- Headstock -->
  <rect x="70" y="20" width="60" height="50" fill="#111" stroke="#000" stroke-width="3"/>
  <!-- Tuning pegs - left side -->
  <rect x="50" y="22" width="22" height="8" fill="#111" stroke="#000" stroke-width="2"/>
  <rect x="50" y="36" width="22" height="8" fill="#111" stroke="#000" stroke-width="2"/>
  <!-- Tuning pegs - right side -->
  <rect x="128" y="22" width="22" height="8" fill="#111" stroke="#000" stroke-width="2"/>
  <rect x="128" y="36" width="22" height="8" fill="#111" stroke="#000" stroke-width="2"/>
  <!-- Nut -->
  <rect x="82" y="68" width="36" height="5" fill="#eee" stroke="#000" stroke-width="2"/>
  <!-- Frets -->
  <rect x="82" y="100" width="36" height="3" fill="#888" stroke="#000" stroke-width="1"/>
  <rect x="82" y="130" width="36" height="3" fill="#888" stroke="#000" stroke-width="1"/>
  <rect x="82" y="158" width="36" height="3" fill="#888" stroke="#000" stroke-width="1"/>
  <rect x="82" y="184" width="36" height="3" fill="#888" stroke="#000" stroke-width="1"/>
  <rect x="82" y="208" width="36" height="3" fill="#888" stroke="#000" stroke-width="1"/>
  <rect x="82" y="230" width="36" height="3" fill="#888" stroke="#000" stroke-width="1"/>
  <rect x="82" y="250" width="36" height="3" fill="#888" stroke="#000" stroke-width="1"/>
  <!-- Strings -->
  <line x1="90" y1="22" x2="90" y2="460" stroke="#aaa" stroke-width="1.5"/>
  <line x1="97" y1="22" x2="97" y2="460" stroke="#aaa" stroke-width="2"/>
  <line x1="103" y1="22" x2="103" y2="460" stroke="#aaa" stroke-width="2.5"/>
  <line x1="110" y1="22" x2="110" y2="460" stroke="#aaa" stroke-width="3"/>
  <!-- Split P pickup -->
  <rect x="75" y="350" width="22" height="28" fill="#111" stroke="#eee" stroke-width="2"/>
  <rect x="103" y="358" width="22" height="28" fill="#111" stroke="#eee" stroke-width="2"/>
  <!-- Bridge -->
  <rect x="72" y="440" width="56" height="18" fill="#333" stroke="#000" stroke-width="2"/>
  <rect x="78" y="438" width="6" height="22" fill="#555" stroke="#000" stroke-width="1"/>
  <rect x="88" y="438" width="6" height="22" fill="#555" stroke="#000" stroke-width="1"/>
  <rect x="98" y="438" width="6" height="22" fill="#555" stroke="#000" stroke-width="1"/>
  <rect x="108" y="438" width="6" height="22" fill="#555" stroke="#000" stroke-width="1"/>
  <!-- Strap button bottom -->
  <circle cx="100" cy="488" r="6" fill="#333" stroke="#000" stroke-width="2"/>
  <!-- Strap button side -->
  <circle cx="30" cy="340" r="6" fill="#333" stroke="#000" stroke-width="2"/>
  <!-- Control knobs -->
  <circle cx="130" cy="420" r="8" fill="#222" stroke="#eee" stroke-width="2"/>
  <circle cx="148" cy="408" r="8" fill="#222" stroke="#eee" stroke-width="2"/>
</svg>
